services:
  backend:
    profiles: [prod]
    build: ./backend
    volumes:
      - media_db:/app/data
      - ${MEDIA_ROOT:-./media}:/media:ro
    environment:
      PORT: 3001
      DB_PATH: /app/data/data.db
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      MEDIA_ROOT: /media
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://127.0.0.1}
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  nginx:
    profiles: [prod]
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  media_db:
